# =============================================================================
# Namespaces for ODS Performance Demo
# =============================================================================
# Namespace layout:
#   ingress      - Istio Gateway (entry point for all HTTP traffic)
#   ods-service  - ODS application (Rust service - Step 2)
#   monitoring   - Prometheus + Grafana
#   database-pg  - PostgreSQL (isolated — own ResourceQuota, RBAC, NetworkPolicy)
#   database-mongo - MongoDB (isolated — own ResourceQuota, RBAC, NetworkPolicy)
#
# Separating database namespaces ensures:
#   - Fair benchmark: each DB gets identical ResourceQuota
#   - Independent lifecycle: reinstall one without touching the other
#   - Cleaner RBAC: ods-service can be granted access per DB independently
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: ingress
  labels:
    istio-injection: enabled
    app.kubernetes.io/managed-by: odsperf

---
apiVersion: v1
kind: Namespace
metadata:
  name: ods-service
  labels:
    istio-injection: enabled
    app.kubernetes.io/managed-by: odsperf

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    istio-injection: enabled
    app.kubernetes.io/managed-by: odsperf

---
apiVersion: v1
kind: Namespace
metadata:
  name: database-pg
  labels:
    istio-injection: disabled
    app.kubernetes.io/managed-by: odsperf
    odsperf/db: postgresql

---
apiVersion: v1
kind: Namespace
metadata:
  name: database-mongo
  labels:
    istio-injection: disabled
    app.kubernetes.io/managed-by: odsperf
    odsperf/db: mongodb

---
# ---------------------------------------------------------------------------
# ResourceQuota — ให้ทั้งสอง DB namespace ได้ทรัพยากรเท่ากัน (fair benchmark)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ResourceQuota
metadata:
  name: db-quota
  namespace: database-pg
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: db-quota
  namespace: database-mongo
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
