# =============================================================================
# MongoDB Helm values
# Chart: bitnami/mongodb
# Namespace: databases
# =============================================================================

# ---------------------------------------------------------------------------
# Architecture - standalone for demo (use replicaSet for production)
# ---------------------------------------------------------------------------
architecture: standalone

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
auth:
  enabled: true
  rootUser: "root"
  rootPassword: "mongodb123"
  usernames:
    - "odsuser"
  passwords:
    - "odspassword"
  databases:
    - "odsperf"

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  size: 2Gi

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: 500m

# ---------------------------------------------------------------------------
# MongoDB tuning — WiredTiger cache
# ไม่ใช้ extraFlags (Bitnami entrypoint อาจ parse ไม่ถูก)
# แก้ OOMKill ด้วยการเพิ่ม memory limit เป็น 1Gi แทน
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 27017

# ---------------------------------------------------------------------------
# Metrics / Prometheus exporter (mongodb_exporter)
# ---------------------------------------------------------------------------
metrics:
  enabled: true

  serviceMonitor:
    enabled: true
    namespace: "database-mongo"
    interval: "30s"
    scrapeTimeout: "10s"
    labels:
      release: kube-prometheus-stack

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
